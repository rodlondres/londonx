<script>
(function(){

  // 🔒 PROTEÇÃO TOTAL CONTRA TELA PRETA
  function killOverlay(){
    document.querySelectorAll('div, section').forEach(el=>{
      const s = window.getComputedStyle(el);

      const isBlocking =
        (s.position === 'fixed' || s.position === 'absolute') &&
        parseFloat(s.zIndex) >= 1000;

      const isFull =
        el.offsetWidth >= window.innerWidth * 0.95 &&
        el.offsetHeight >= window.innerHeight * 0.95;

      if(isBlocking && isFull){
        el.style.display = 'none';
      }
    });
  }

  // roda continuamente (garante que não volte)
  setInterval(killOverlay, 500);

  // 🟢 GARANTE CLIQUE LIBERADO
  document.body.style.pointerEvents = 'auto';

})();
</script>
<script>
(function(){

  function killOverlay(){
    document.querySelectorAll('*').forEach(el=>{
      const s = window.getComputedStyle(el);

      const isOverlay =
        (s.position === 'fixed' || s.position === 'absolute') &&
        parseFloat(s.zIndex) >= 1000;

      const isFull =
        el.offsetWidth >= window.innerWidth * 0.9 &&
        el.offsetHeight >= window.innerHeight * 0.9;

      if(isOverlay && isFull){
        el.style.display = 'none';
      }
    });
  }

  setInterval(killOverlay, 400);

  document.body.style.pointerEvents = 'auto';

})();
</script>
