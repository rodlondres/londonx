<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LondonX Bot">
<meta name="theme-color" content="#060b14">
<meta name="mobile-web-app-capable" content="yes">
<title>LONDONX BOT — Forex OTC v5.0</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#010508; --bg2:#050c16; --card:#07101e; --card2:#0a1525;
  --border:#1a2d4f; --border2:#243d63;
  --cyan:#00e5ff; --gold:#f5c518; --gold2:#ffe033; --green:#00e676; --green2:#00c853;
  --red:#ff1744; --red2:#d50000;
  --yellow:#ffd600; --orange:#ff6d00; --purple:#7c4dff;
  --text:#e0f0ff; --text2:#7aa3cc; --text3:#4a6d8c;
  --glow-cyan:0 0 20px rgba(0,229,255,.4);
  --glow-green:0 0 20px rgba(0,230,118,.4);
  --glow-red:0 0 20px rgba(255,23,68,.4);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;overflow-x:hidden;max-width:100vw;padding-bottom:env(safe-area-inset-bottom);padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right);
  background-image:radial-gradient(ellipse at 20% 0%,rgba(0,229,255,.05) 0%,transparent 50%),
  radial-gradient(ellipse at 80% 100%,rgba(124,77,255,.05) 0%,transparent 50%);}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);}
*,*::before,*::after{box-sizing:border-box;}
::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-track{background:#0a0f1e;} ::-webkit-scrollbar-thumb{background:#1a2d4f;border-radius:2px;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes glow-pulse{0%,100%{box-shadow:0 0 10px rgba(0,229,255,.3)}50%{box-shadow:0 0 30px rgba(0,229,255,.7)}}
@keyframes scan{0%{transform:translateY(-100%)}100%{transform:translateY(100vh)}}
@keyframes ticker{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}
@keyframes fade-in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.scan-line{position:fixed;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(0,229,255,.4),transparent);animation:scan 4s linear infinite;pointer-events:none;z-index:9998;}
.container{max-width:480px;margin:0 auto;padding:8px;width:100%;box-sizing:border-box;}

/* HEADER */
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;box-shadow:0 0 30px rgba(0,229,255,.08);}
.logo{font-family:'Orbitron',monospace;font-size:20px;font-weight:900;color:#f5c518;letter-spacing:3px;text-shadow:0 0 30px rgba(245,197,24,.9),0 0 60px rgba(245,197,24,.4);}
.logo span{color:#ffffff;font-size:13px;display:block;letter-spacing:2px;font-weight:700;margin-top:-2px;}
.live-badge{background:rgba(0,230,118,.15);color:var(--green);border:1px solid rgba(0,230,118,.3);padding:3px 8px;border-radius:20px;font-size:13px;font-family:'Share Tech Mono',monospace;letter-spacing:2px;animation:glow-pulse 2s ease-in-out infinite;}
.live-dot{display:inline-block;width:6px;height:6px;background:var(--green);border-radius:50%;margin-right:4px;animation:blink 1s infinite;}
.clock{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text2);}

/* TICKER */
.ticker-wrap{overflow:hidden;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:6px 0;margin-bottom:8px;max-width:100%;}
.ticker-inner{display:flex;gap:40px;animation:ticker 30s linear infinite;white-space:nowrap;}
.tick-item{font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--text2);}
.up{color:var(--green);} .dn{color:var(--red);}

/* LABEL */
.slabel{font-size:13px;letter-spacing:3px;color:#f5c518;font-weight:900;text-shadow:0 0 12px rgba(245,197,24,.5);text-transform:uppercase;margin-bottom:6px;padding-left:2px;}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:8px;}
.stat-item{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px;text-align:center;}
.stat-val{font-family:'Orbitron',monospace;font-size:14px;font-weight:900;}
.stat-lbl{font-size:11px;letter-spacing:1px;color:#d4e8ff;font-weight:800;text-transform:uppercase;margin-top:2px;}

/* PAIRS */
.pair-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-bottom:8px;}
.pair-btn{background:var(--card);border:1px solid var(--border2);color:#dff0ff;font-family:'Rajdhani',sans-serif;font-size:9.5px;font-weight:800;padding:6px 2px;border-radius:6px;cursor:pointer;text-align:center;transition:all .2s;letter-spacing:.3px;}
.pair-btn:hover{border-color:var(--cyan);color:#fff;background:rgba(0,229,255,.1);text-shadow:0 0 8px rgba(255,255,255,.4);}
.pair-btn.active{background:rgba(0,229,255,.18);border-color:var(--cyan);color:#fff;box-shadow:var(--glow-cyan);font-weight:900;text-shadow:0 0 10px rgba(0,229,255,.6);}
.pair-btn .otc{font-size:11px;color:#00c8e8;display:block;font-weight:700;}
.pair-btn .payout{font-size:11px;color:#ffd600;display:block;font-weight:800;letter-spacing:.5px;}
.pair-btn .payout.high{color:#00e676;}
.pair-btn .payout.low{color:#ff1744;}

/* TF */
.tf-row{display:flex;gap:4px;margin-bottom:8px;}
.tf-btn{background:var(--card);border:1px solid var(--border);color:var(--text2);font-family:'Orbitron',monospace;font-size:13px;font-weight:700;padding:6px 8px;border-radius:8px;cursor:pointer;text-align:center;transition:all .2s;white-space:nowrap;}
.tf-btn.active{background:rgba(0,229,255,.15);border-color:var(--cyan);color:var(--cyan);box-shadow:var(--glow-cyan);}
.tf-btn.long-tf{border-color:#ab47bc44;color:#ce93d8;}
.tf-btn.long-tf.active{background:rgba(171,71,188,.15);border-color:#ab47bc;color:#ce93d8;box-shadow:0 0 8px rgba(171,71,188,.4);}
#tfRow{display:flex;flex-wrap:wrap;gap:4px;}

/* CHART */
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px;}
canvas{width:100%;display:block;}
#miniChart{height:170px;}
#rsiChart{height:44px;}

/* REGIME */
.regime-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px;position:relative;overflow:hidden;}
.regime-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.regime-card.trend::before{background:linear-gradient(90deg,var(--green),var(--cyan));}
.regime-card.lateral::before{background:linear-gradient(90deg,var(--yellow),var(--orange));}
.regime-card.volatile::before{background:linear-gradient(90deg,var(--red),var(--purple));}
.regime-badges{display:flex;gap:6px;}
.regime-badge{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:2px;cursor:pointer;transition:all .3s;opacity:0.4;font-family:'Orbitron',monospace;}
.regime-badge.trend{background:rgba(0,230,118,.1);color:var(--green);border:1px solid rgba(0,230,118,.2);}
.regime-badge.lateral{background:rgba(255,214,0,.1);color:var(--yellow);border:1px solid rgba(255,214,0,.2);}
.regime-badge.volatile{background:rgba(255,23,68,.1);color:var(--red);border:1px solid rgba(255,23,68,.2);}
.regime-badge.active{opacity:1;transform:scale(1.08);}
.regime-badge.active.trend{
  background:rgba(0,230,118,.25);
  color:#fff;
  border:2px solid var(--green);
  box-shadow:0 0 18px rgba(0,230,118,.7), 0 0 6px rgba(0,230,118,.4);
  animation:pulseTrend 1.8s ease-in-out infinite;
}
.regime-badge.active.lateral{
  background:rgba(255,214,0,.25);
  color:#fff;
  border:2px solid var(--yellow);
  box-shadow:0 0 18px rgba(255,214,0,.7), 0 0 6px rgba(255,214,0,.4);
  animation:pulseLateral 1.8s ease-in-out infinite;
}
.regime-badge.active.volatile{
  background:rgba(255,23,68,.25);
  color:#fff;
  border:2px solid var(--red);
  box-shadow:0 0 18px rgba(255,23,68,.7), 0 0 6px rgba(255,23,68,.4);
  animation:pulseVolatile 1.2s ease-in-out infinite;
}
@keyframes pulseTrend{
  0%,100%{box-shadow:0 0 18px rgba(0,230,118,.7),0 0 6px rgba(0,230,118,.4);}
  50%{box-shadow:0 0 28px rgba(0,230,118,1),0 0 12px rgba(0,230,118,.6);}
}
@keyframes pulseLateral{
  0%,100%{box-shadow:0 0 18px rgba(255,214,0,.7),0 0 6px rgba(255,214,0,.4);}
  50%{box-shadow:0 0 28px rgba(255,214,0,1),0 0 12px rgba(255,214,0,.6);}
}
@keyframes pulseVolatile{
  0%,100%{box-shadow:0 0 18px rgba(255,23,68,.7),0 0 6px rgba(255,23,68,.4);}
  50%{box-shadow:0 0 32px rgba(255,23,68,1),0 0 14px rgba(255,23,68,.7);}
}
.cond{font-family:'Share Tech Mono',monospace;font-size:12px;color:#a0c4e8;font-weight:700;}
.cond span{color:#ffffff;font-weight:700;}

/* ===================== CONFLUÊNCIA MESTRE ===================== */
.conf-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:8px;position:relative;overflow:hidden;}
.conf-card::after{content:'';position:absolute;inset:1px;border-radius:13px;background:radial-gradient(ellipse at 50% -10%,rgba(0,229,255,.04),transparent 55%);pointer-events:none;}
.conf-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.conf-pair{font-family:'Orbitron',monospace;font-size:15px;font-weight:900;color:#f5c518;text-shadow:0 0 20px rgba(245,197,24,.6);}
.conf-tf{font-size:12px;color:#a0c4e8;font-weight:700;font-family:'Share Tech Mono';}
.conf-body{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.circle-wrap{position:relative;width:108px;height:108px;flex-shrink:0;}
.circle-wrap svg{width:108px;height:108px;}
.circle-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-prob{font-family:'Orbitron',monospace;font-size:32px;font-weight:900;line-height:1;}
.big-pct{font-size:12px;color:var(--text2);}
.big-lbl{font-size:11px;letter-spacing:2px;color:#a0c4e8;font-weight:700;margin-top:2px;}
.sources-col{flex:1;display:flex;flex-direction:column;gap:5px;}
.src-row{display:flex;align-items:center;gap:5px;}
.src-ico{font-size:11px;width:15px;text-align:center;flex-shrink:0;}
.src-nm{font-size:12px;font-weight:800;color:#dff0ff;width:68px;flex-shrink:0;letter-spacing:.5px;}
.src-bw{flex:1;height:7px;background:var(--border);border-radius:3px;overflow:hidden;}
.src-bf{height:100%;border-radius:4px;transition:width .7s ease;}
.src-pc{font-family:'Share Tech Mono',monospace;font-size:12px;width:24px;text-align:right;flex-shrink:0;}
.src-sig{font-size:12px;font-weight:700;padding:1px 4px;border-radius:3px;flex-shrink:0;width:32px;text-align:center;}
.src-sig.bull{background:rgba(0,230,118,.15);color:var(--green);}
.src-sig.bear{background:rgba(255,23,68,.15);color:var(--red);}
.src-sig.neut{background:rgba(255,214,0,.1);color:var(--yellow);}
.src-wt{font-size:11px;color:#a0c4e8;font-weight:700;width:28px;text-align:right;flex-shrink:0;}
.score-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.score-bar-label{font-size:12px;letter-spacing:2px;color:#a0c4e8;font-weight:700;flex-shrink:0;}
.score-bar-track{flex:1;height:10px;background:var(--border);border-radius:5px;overflow:hidden;}
.score-bar-fill{height:100%;border-radius:5px;transition:width .7s;}
.score-bar-val{font-family:'Orbitron',monospace;font-size:18px;font-weight:900;flex-shrink:0;}
.tokens{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px;}
.tok{padding:2px 7px;border-radius:4px;font-size:12px;font-weight:700;letter-spacing:.5px;}
.tok.buy{background:rgba(0,230,118,.12);color:var(--green);border:1px solid rgba(0,230,118,.2);}
.tok.sell{background:rgba(255,23,68,.12);color:var(--red);border:1px solid rgba(255,23,68,.2);}
.tok.neut{background:rgba(255,214,0,.08);color:var(--yellow);border:1px solid rgba(255,214,0,.15);}
.tok-src{font-size:11px;opacity:.55;margin-right:2px;}
.dir-row{display:flex;gap:8px;}
.dir-btn{flex:1;padding:13px;border-radius:10px;font-family:'Orbitron',monospace;font-size:12px;font-weight:900;letter-spacing:2px;cursor:pointer;border:2px solid;transition:all .2s;text-align:center;}
.dir-up{background:rgba(0,230,118,.1);border-color:var(--green);color:var(--green);}
.dir-up.active,.dir-up:hover{background:rgba(0,230,118,.25);box-shadow:var(--glow-green);}
.dir-dn{background:rgba(255,23,68,.1);border-color:var(--red);color:var(--red);}
.dir-dn.active,.dir-dn:hover{background:rgba(255,23,68,.25);box-shadow:var(--glow-red);}
.dir-arrow{font-size:18px;display:block;margin-bottom:1px;}
.dir-sub{font-size:12px;color:#a0c4e8;font-family:'Rajdhani';font-weight:400;margin-top:2px;}

/* ALERT */
.alert-b{padding:10px 14px;border-radius:8px;margin-bottom:8px;display:flex;flex-direction:column;align-items:flex-start;gap:4px;}
.alert-b.ok{background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.3);color:var(--green);}
.alert-b.warn{background:rgba(255,109,0,.1);border:1px solid rgba(255,109,0,.3);color:var(--orange);}
.alert-b.danger{background:rgba(255,23,68,.1);border:1px solid rgba(255,23,68,.3);color:var(--red);}
.alert-txt{font-size:13px;font-weight:600;letter-spacing:1px;}
#signalStrength{font-size:11px;font-weight:700;letter-spacing:1px;color:var(--text2);margin-top:2px;}

/* INDICATORS */
.ind-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px;}
.ind-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.ind-item{background:var(--panel2);border:1px solid var(--border2);border-radius:10px;padding:11px 9px;position:relative;overflow:hidden;}
.ind-item::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;}
.ind-item.bull::before{background:var(--green);} .ind-item.bear::before{background:var(--red);} .ind-item.neut::before{background:var(--yellow);}
.ind-name{font-size:12px;letter-spacing:2px;color:#a0c4e8;font-weight:700;text-transform:uppercase;}
.ind-val{font-family:'Share Tech Mono',monospace;font-size:13px;font-weight:700;margin-top:2px;}
.ind-val.bull{color:var(--green);} .ind-val.bear{color:var(--red);} .ind-val.neut{color:var(--yellow);}
.ind-sig{font-size:12px;font-weight:700;font-weight:800;margin-top:1px;letter-spacing:1px;}
.ind-sig.bull{color:#00e676;} .ind-sig.bear{color:#ff1744;} .ind-sig.neut{color:#ffd600;}
.ind-bar{height:2px;background:var(--border);border-radius:1px;margin-top:5px;}
.ind-bar-fill{height:100%;border-radius:1px;transition:width .5s;}
.ind-bar-fill.bull{background:var(--green);} .ind-bar-fill.bear{background:var(--red);} .ind-bar-fill.neut{background:var(--yellow);}
.ind-dot{position:absolute;top:6px;right:6px;width:6px;height:6px;border-radius:50%;}
.ind-dot.bull{background:var(--green);box-shadow:0 0 6px rgba(0,230,118,.8);}
.ind-dot.bear{background:var(--red);box-shadow:0 0 6px rgba(255,23,68,.8);}
.ind-dot.neut{background:var(--yellow);}

/* DEEP ANALYSIS */
.deep-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px;}
.atabs{display:flex;gap:4px;margin-bottom:10px;overflow-x:auto;}
.atabs::-webkit-scrollbar{display:none;}
.atab{background:var(--bg2);border:1px solid var(--border);color:#a0c4e8;font-size:12px;font-weight:700;letter-spacing:1px;padding:5px 10px;border-radius:4px;cursor:pointer;white-space:nowrap;transition:all .2s;}
.atab.active{background:rgba(0,229,255,.1);border-color:var(--cyan);color:var(--cyan);}
.a-content{animation:fade-in .3s ease;}
.a-row{display:flex;align-items:center;padding:5px 0;border-bottom:1px solid rgba(26,45,79,.5);}
.a-row:last-child{border-bottom:none;}
.a-lbl{font-size:13px;color:#dff0ff;font-weight:700;flex:1.2;}
.a-bar{flex:1;margin:0 8px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.a-fill{height:100%;border-radius:2px;}
.a-val{font-family:'Share Tech Mono',monospace;font-size:13px;min-width:80px;text-align:right;}
.a-badge{font-size:12px;font-weight:700;padding:1px 5px;border-radius:3px;margin-left:4px;flex-shrink:0;}
.a-badge.buy{background:rgba(0,230,118,.15);color:var(--green);}
.a-badge.sell{background:rgba(255,23,68,.15);color:var(--red);}
.a-badge.neut{background:rgba(255,214,0,.1);color:var(--yellow);}
.src-score-line{display:flex;align-items:center;justify-content:space-between;padding:8px;background:var(--bg2);border-radius:6px;margin-top:8px;border:1px solid var(--border);}
.ssl-lbl{font-size:12px;letter-spacing:2px;color:#a0c4e8;font-weight:700;}
.ssl-dots{display:flex;gap:3px;}
.sdot{width:8px;height:8px;border-radius:2px;background:var(--border);transition:all .3s;}
.ssl-val{font-family:'Orbitron',monospace;font-size:14px;font-weight:900;}

/* TAPE */
.tape-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px;}
.tape-bar-row{display:flex;height:10px;border-radius:5px;overflow:hidden;margin:8px 0;}
.tape-buy-bar{height:100%;background:linear-gradient(90deg,var(--green2),var(--green));transition:width .5s;}
.tape-sell-bar{height:100%;background:linear-gradient(90deg,var(--red2),var(--red));transition:width .5s;}
.tape-flow{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.tape-side{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px;text-align:center;}
.tape-side.bs{border-color:rgba(0,230,118,.2);} .tape-side.ss{border-color:rgba(255,23,68,.2);}
.tape-val{font-family:'Orbitron',monospace;font-size:20px;font-weight:900;}
.tape-val.buy{color:var(--green);} .tape-val.sell{color:var(--red);}

/* ML */
.ml-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px;overflow:hidden;position:relative;}
.ml-card::before{content:'';position:absolute;top:-30px;right:-30px;width:100px;height:100px;border-radius:50%;background:radial-gradient(circle,rgba(124,77,255,.1),transparent);}
.ml-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:8px;}
.ml-item{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:8px;text-align:center;}
.ml-v{font-family:'Orbitron',monospace;font-size:14px;font-weight:700;color:var(--purple);}
.ml-l{font-size:11px;letter-spacing:1px;color:#a0c4e8;margin-top:2px;}
.ml-spin{width:10px;height:10px;border:2px solid var(--border);border-top-color:var(--purple);border-radius:50%;animation:spin .8s linear infinite;display:inline-block;margin-right:6px;}

/* STRATEGIES */
.strat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px;}
.strat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.strat-btn{background:var(--bg2);border:2px solid var(--border);border-radius:8px;padding:10px 6px;cursor:pointer;text-align:center;transition:all .2s;}
.strat-btn.active.cons{border-color:var(--green);background:rgba(0,230,118,.08);box-shadow:0 0 12px rgba(0,230,118,.2);}
.strat-btn.active.mart{border-color:var(--orange);background:rgba(255,109,0,.08);box-shadow:0 0 12px rgba(255,109,0,.2);}
.strat-btn.active.soros{border-color:var(--purple);background:rgba(124,77,255,.08);box-shadow:0 0 12px rgba(124,77,255,.2);}
.sico{font-size:18px;display:block;margin-bottom:4px;}
.snm{font-size:13px;font-weight:700;font-weight:700;letter-spacing:2px;text-transform:uppercase;}
.snm.cons{color:var(--green);} .snm.mart{color:var(--orange);} .snm.soros{color:var(--purple);}
.sdesc{font-size:12px;color:#a0c4e8;margin-top:3px;line-height:1.4;}
.slvls{display:flex;gap:2px;justify-content:center;margin-top:5px;}
.lvl{width:6px;height:6px;border-radius:1px;}
.lvl.g{background:var(--green);} .lvl.o{background:var(--orange);} .lvl.p{background:var(--purple);} .lvl.x{background:var(--border);}

/* ENTRY */
.entry-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px;}
.erow{display:flex;align-items:center;gap:8px;}
.esizes{display:flex;gap:4px;flex:1;}
.esize{flex:1;background:var(--bg2);border:1px solid var(--border);color:var(--text2);font-family:'Orbitron',monospace;font-size:13px;font-weight:700;padding:8px 4px;border-radius:6px;cursor:pointer;text-align:center;transition:all .2s;}
.esize:hover,.esize.active{background:rgba(0,229,255,.1);border-color:var(--cyan);color:var(--cyan);}
.ecustom{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:8px 10px;color:var(--text);font-family:'Orbitron',monospace;font-size:16px;font-weight:700;width:80px;outline:none;text-align:center;}
.ecustom:focus{border-color:var(--cyan);}

/* DURATION */
.dur-row{display:flex;gap:6px;flex-wrap:wrap;}
.dur-btn{background:var(--bg2);border:1px solid var(--border);color:#a0c4e8;font-family:'Orbitron',monospace;font-size:13px;font-weight:700;padding:6px 8px;border-radius:6px;cursor:pointer;text-align:center;transition:all .2s;white-space:nowrap;}
.dur-btn.active{background:rgba(0,229,255,.15);border-color:var(--cyan);color:var(--cyan);box-shadow:var(--glow-cyan);}
.dur-btn.long-dur{border-color:#ffd60044;color:#ffd600aa;}
.dur-btn.long-dur.active{background:rgba(255,214,0,.12);border-color:#ffd600;color:#ffd600;box-shadow:0 0 8px rgba(255,214,0,.3);}
#durRow{display:flex;flex-wrap:wrap;gap:4px;}

/* STOP */
.stop-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px;}
.stop-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.stop-lbl{font-size:12px;letter-spacing:2px;color:#a0c4e8;text-transform:uppercase;margin-bottom:4px;}
.stop-wrap{position:relative;}
.stop-inp{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:10px 28px 10px 12px;color:var(--text);font-family:'Orbitron',monospace;font-size:16px;font-weight:700;outline:none;transition:all .2s;}
.stop-inp.sl{border-color:rgba(255,23,68,.3);color:var(--red);}
.stop-inp.sl:focus{border-color:var(--red);box-shadow:0 0 12px rgba(255,23,68,.2);}
.stop-inp.sg{border-color:rgba(0,230,118,.3);color:var(--green);}
.stop-inp.sg:focus{border-color:var(--green);box-shadow:0 0 12px rgba(0,230,118,.2);}
.stop-unit{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:13px;color:#a0c4e8;pointer-events:none;margin-top:5px;}
