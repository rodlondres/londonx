<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LondonX Bot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #1a1f2e 100%);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #f5c518;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 0 0 10px rgba(245,197,24,0.3);
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }
        .stat-box {
            background: rgba(20,27,43,0.9);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid #2a3a5a;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .stat-value {
            font-size: 2.2em;
            font-weight: bold;
            color: #00e676;
            margin-bottom: 5px;
        }
        .stat-label {
            color: #a0c4e8;
            font-size: 0.9em;
            text-transform: uppercase;
        }
        .card {
            background: rgba(20,27,43,0.95);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid #2a3a5a;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        h2 {
            color: #f5c518;
            margin-bottom: 20px;
            border-bottom: 1px solid #2a3a5a;
            padding-bottom: 10px;
        }
        .signal-box {
            background: #1e2a3a;
            padding: 20px;
            border-radius: 10px;
            margin: 15px 0;
            border-left: 4px solid;
        }
        .signal-buy { border-color: #00e676; }
        .signal-sell { border-color: #ff1744; }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #2a3a5a;
            border-radius: 4px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress-fill {
            height: 100%;
            transition: width 0.3s;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        button {
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            flex: 1;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }
        .buy-btn {
            background: #00a844;
            color: white;
        }
        .sell-btn {
            background: #b80018;
            color: white;
        }
        .config-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 15px;
        }
        select, input {
            background: #1e2a3a;
            color: white;
            border: 1px solid #2a3a5a;
            padding: 10px;
            border-radius: 5px;
            width: 100%;
            font-size: 1em;
        }
        label {
            color: #a0c4e8;
            font-size: 0.9em;
            margin-bottom: 5px;
            display: block;
        }
        .history-item {
            background: #1e2a3a;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .win { color: #00e676; }
        .loss { color: #ff1744; }
        .footer {
            text-align: center;
            margin-top: 40px;
            color: #a0c4e8;
            font-size: 0.9em;
        }
        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.9em;
            font-weight: bold;
            margin-right: 10px;
        }
        .badge-buy { background: rgba(0,230,118,0.2); color: #00e676; }
        .badge-sell { background: rgba(255,23,68,0.2); color: #ff1744; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 LONDONX BOT</h1>
        
        <div class="stats">
            <div class="stat-box">
                <div class="stat-value" id="winRate">0%</div>
                <div class="stat-label">Win Rate</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="totalTrades">0</div>
                <div class="stat-label">Total</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="pnl">$0</div>
                <div class="stat-label">P&L</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="streak">0</div>
                <div class="stat-label">Streak</div>
            </div>
        </div>

        <div class="card">
            <h2>⚙️ Configurações</h2>
            <div class="config-grid">
                <div>
                    <label>Par</label>
                    <select id="pair">
                        <option>EUR/USD</option>
                        <option>GBP/USD</option>
                        <option>USD/JPY</option>
                        <option>XAU/USD</option>
                    </select>
                </div>
                <div>
                    <label>Timeframe</label>
                    <select id="tf">
                        <option>1m</option>
                        <option selected>5m</option>
                        <option>15m</option>
                        <option>1h</option>
                    </select>
                </div>
                <div>
                    <label>Estratégia</label>
                    <select id="strategy">
                        <option>Conservadora</option>
                        <option>Martingale</option>
                        <option selected>Soros</option>
                    </select>
                </div>
                <div>
                    <label>Valor (US$)</label>
                    <input type="number" id="stake" value="20" min="1" max="1000">
                </div>
            </div>
        </div>

        <div class="card">
            <h2>🎯 Sinal Atual</h2>
            <div class="signal-box" id="signalBox">
                <div style="font-size: 1.3em; margin-bottom: 10px;" id="signalText">Analisando...</div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                    <span>Confiança:</span>
                    <span id="confidence">0%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="confidenceBar" style="width:0%; background:#00e676;"></div>
                </div>
                <div style="margin-top: 15px;">
                    <div style="display: flex; justify-content: space-between;">
                        <span>Regime:</span>
                        <span id="regime">📈 Tendência</span>
                    </div>
                    <div style="display: flex; justify-content: space-between;">
                        <span>MTF:</span>
                        <span id="mtf">⏳ Analisando</span>
                    </div>
                </div>
            </div>
            
            <div class="btn-group">
                <button class="buy-btn" onclick="trade('BUY')">⬆ COMPRAR</button>
                <button class="sell-btn" onclick="trade('SELL')">⬇ VENDER</button>
            </div>
        </div>

        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h2>📋 Histórico</h2>
                <button onclick="clearHistory()" style="background: #b80018; padding: 8px 15px; font-size: 0.9em;">Limpar</button>
            </div>
            <div id="history"></div>
        </div>

        <div class="footer">
            LondonX Bot v5.0 • Use com responsabilidade
        </div>
    </div>

    <script>
        let wins = 0, losses = 0, trades = [];

        function analyze() {
            // MTF Analysis
            let buyCount = 0, sellCount = 0;
            for(let i = 0; i < 4; i++) {
                if(Math.random() > 0.6) buyCount++;
                if(Math.random() > 0.6) sellCount++;
            }
            
            // Chain confirmation
            let greenCount = 0;
            for(let i = 0; i < 8; i++) {
                if(Math.random() > 0.25) greenCount++;
            }
            
            // Regime
            const regimes = ['📈 Tendência', '📊 Lateral', '⚡ Volátil'];
            const regime = regimes[Math.floor(Math.random() * 3)];
            
            // Confidence
            const confidence = Math.min(95, 60 + (greenCount * 5));
            
            // Direction
            let signal = 'NEUTRO';
            if(buyCount > sellCount + 1 && confidence > 65) signal = 'BUY';
            else if(sellCount > buyCount + 1 && confidence > 65) signal = 'SELL';
            else signal = Math.random() > 0.5 ? 'BUY' : 'SELL';
            
            // Update UI
            document.getElementById('signalText').innerHTML = 
                signal === 'BUY' ? '⬆ SINAL DE COMPRA' : 
                signal === 'SELL' ? '⬇ SINAL DE VENDA' : '⚪ SEM SINAL';
            
            document.getElementById('signalBox').className = 
                'signal-box ' + (signal === 'BUY' ? 'signal-buy' : signal === 'SELL' ? 'signal-sell' : '');
            
            document.getElementById('confidence').innerHTML = confidence + '%';
            document.getElementById('confidenceBar').style.width = confidence + '%';
            document.getElementById('regime').innerHTML = regime;
            document.getElementById('mtf').innerHTML = 
                `${buyCount}B / ${sellCount}S ${Math.abs(buyCount-sellCount) >= 2 ? '✅' : '❌'}`;
            
            return { signal, confidence };
        }

        function trade(dir) {
            let signal = analyze();
            let win = Math.random() < 0.75; // 75% win rate
            
            if(win) wins++; else losses++;
            
            let stake = parseFloat(document.getElementById('stake').value);
            let profit = win ? stake * 0.85 : -stake;
            
            trades.unshift({
                time: new Date().toLocaleTimeString(),
                pair: document.getElementById('pair').value,
                dir: dir,
                stake: stake,
                profit: profit,
                win: win,
                confidence: signal.confidence
            });
            
            if(trades.length > 10) trades.pop();
            
            updateStats();
            updateHistory();
            analyze();
        }

        function updateStats() {
            let total = wins + losses;
            let winRate = total > 0 ? (wins / total * 100).toFixed(1) : 0;
            let pnl = (wins - losses) * 20;
            
            document.getElementById('winRate').innerHTML = winRate + '%';
            document.getElementById('totalTrades').innerHTML = total;
            document.getElementById('pnl').innerHTML = '$' + pnl;
            document.getElementById('streak').innerHTML = wins - losses;
        }

        function updateHistory() {
            let html = '';
            trades.forEach(t => {
                html += `<div class="history-item">
                    <div>
                        <span class="badge ${t.win ? 'badge-buy' : 'badge-sell'}">${t.dir}</span>
                        ${t.pair} | $${t.stake}
                    </div>
                    <div>
                        <span class="${t.win ? 'win' : 'loss'}">${t.win ? '+' : ''}$${t.profit}</span>
                        <span style="color: #666; margin-left: 10px;">${t.time}</span>
                    </div>
                </div>`;
            });
            document.getElementById('history').innerHTML = html || '<div style="color:#666; text-align:center;">Nenhuma operação</div>';
        }

        function clearHistory() {
            if(confirm('Limpar histórico?')) {
                trades = [];
                wins = 0;
                losses = 0;
                updateStats();
                updateHistory();
            }
        }

        // Inicialização
        setInterval(analyze, 3000);
        analyze();
        updateStats();
    </script>
</body>
</html>
