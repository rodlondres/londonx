
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deriv Pro Signal Bot</title>

<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

<style>
body{
background:#020617;
color:#e2e8f0;
font-family:Arial, Helvetica, sans-serif;
margin:0;
}

header{
background:#0f172a;
padding:15px;
border-bottom:1px solid #1e293b;
}

.container{
padding:20px;
}

#chart{
width:100%;
height:420px;
}

.panel{
margin-top:20px;
background:#0f172a;
padding:15px;
border-radius:8px;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

select{
width:100%;
padding:6px;
}

.signal{
font-size:28px;
font-weight:bold;
margin-top:10px;
}

.call{color:#22c55e;}
.put{color:#ef4444;}
.wait{color:#94a3b8;}
</style>
</head>

<body>

<header>
<h2>Deriv Volatility Signal Terminal</h2>
</header>

<div class="container">

<div id="chart"></div>

<div class="panel">
<div class="grid">

<div>
<b>Asset</b>
<select id="asset">
<option value="R_75">Volatility 75</option>
<option value="R_50">Volatility 50</option>
<option value="R_25">Volatility 25</option>
<option value="R_100">Volatility 100</option>
</select>
</div>

<div>
<b>Timeframe</b>
<select id="tf">
<option value="60">1m</option>
<option value="300">5m</option>
<option value="900">15m</option>
<option value="1800">30m</option>
<option value="3600">1h</option>
</select>
</div>

<div>
<b>Status</b>
<div id="status">connecting...</div>
</div>

<div>
<b>Score</b>
<div id="score">0</div>
</div>

</div>
</div>

<div class="panel">
<div><b>Trend:</b> <span id="trend">-</span></div>
<div><b>Volatility:</b> <span id="volatility">-</span></div>
<div class="signal wait" id="signal">WAIT</div>
</div>

</div>

<script>

// CHART
const chart = LightweightCharts.createChart(
document.getElementById("chart"),
{
width:window.innerWidth-40,
height:420,
layout:{background:{color:"#020617"},textColor:"#cbd5f5"},
grid:{vertLines:{color:"#1e293b"},horzLines:{color:"#1e293b"}}
}
);

const candles = chart.addCandlestickSeries();
const emaFast = chart.addLineSeries();
const emaMid = chart.addLineSeries();
const emaSlow = chart.addLineSeries();

// DATA
let ws;
let ticks=[];
let candlesData=[];
let currentCandle=null;

// CONNECT
function connect(){

ws = new WebSocket("wss://ws.derivws.com/websockets/v3?app_id=1089");

ws.onopen=()=>{

document.getElementById("status").innerText="connected";

subscribe();

};

ws.onmessage=(msg)=>{

let data=JSON.parse(msg.data);

if(data.tick){

processTick(data.tick.quote,data.tick.epoch);

}

};

}

function subscribe(){

let asset=document.getElementById("asset").value;

ws.send(JSON.stringify({
ticks:asset,
subscribe:1
}));

}

// TICK -> CANDLE
function processTick(price,time){

let tf=parseInt(document.getElementById("tf").value);

let candleTime=Math.floor(time/tf)*tf;

if(!currentCandle || candleTime!=currentCandle.time){

if(currentCandle){

candlesData.push(currentCandle);
candles.update(currentCandle);

}

currentCandle={
time:candleTime,
open:price,
high:price,
low:price,
close:price
};

}else{

currentCandle.high=Math.max(currentCandle.high,price);
currentCandle.low=Math.min(currentCandle.low,price);
currentCandle.close=price;

}

calculate();

}

// INDICATORS

function EMA(period){

if(candlesData.length<period) return null;

let k=2/(period+1);

let ema=candlesData[0].close;

for(let i=1;i<candlesData.length;i++){

ema=candlesData[i].close*k + ema*(1-k);

}

return ema;

}

function ATR(){

if(candlesData.length<20) return 0;

let sum=0;

for(let i=1;i<candlesData.length;i++){

sum+=Math.abs(candlesData[i].high-candlesData[i].low);

}

return sum/candlesData.length;

}

function RSI(){

if(candlesData.length<14) return 50;

let gain=0;
let loss=0;

for(let i=1;i<candlesData.length;i++){

let diff=candlesData[i].close-candlesData[i-1].close;

if(diff>0) gain+=diff;
else loss+=Math.abs(diff);

}

let rs=gain/(loss+0.00001);

return 100-(100/(1+rs));

}

// SIGNAL ENGINE

function calculate(){

if(candlesData.length<25) return;

let e3=EMA(3);
let e8=EMA(8);
let e20=EMA(20);

let compression=Math.abs(e3-e20)/e20;

let atr=ATR();
let rsi=RSI();

let score=0;

if(compression<0.0003) score+=25;
if(atr>0.5) score+=20;
if(rsi>55 || rsi<45) score+=20;

let trend="SIDEWAYS";

if(e3>e20) trend="UP";
if(e3<e20) trend="DOWN";

document.getElementById("trend").innerText=trend;

document.getElementById("volatility").innerText=atr.toFixed(2);

document.getElementById("score").innerText=Math.round(score);

let signal="WAIT";

if(score>60){

if(trend==="UP" && rsi>55) signal="CALL";
if(trend==="DOWN" && rsi<45) signal="PUT";

}

updateSignal(signal);

}

// UI

function updateSignal(sig){

let el=document.getElementById("signal");

if(sig==="CALL"){

el.innerText="CALL ↑";
el.className="signal call";

}

else if(sig==="PUT"){

el.innerText="PUT ↓";
el.className="signal put";

}

else{

el.innerText="WAIT";
el.className="signal wait";

}

}

// ASSET CHANGE

document.getElementById("asset").onchange=()=>{

ws.close();
candlesData=[];
connect();

}

// START

connect();

</script>

</body>
</html>
