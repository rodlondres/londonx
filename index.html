<!-- FINAL VERSION - LondonX Institutional Bot with Sniper Mode -->
<script>

// =============================
// 🔘 SNIPER MODE TOGGLE
// =============================
let SNIPER_MODE = false;

function toggleSniperMode(){
  SNIPER_MODE = !SNIPER_MODE;
  console.log("Sniper Mode:", SNIPER_MODE ? "ON" : "OFF");
}

// =============================
// 🧠 REGIME WEIGHTING
// =============================
function getRegimeWeights(regime, atrRegime){
  let base = { rsi:1, bollinger:1, ema:1, stochastic:1, adx:1 };

  if(regime === 'trend'){
    base = { rsi:0.8, bollinger:1.2, ema:1.3, stochastic:0.7, adx:1.4 };
  }
  if(regime === 'lateral'){
    base = { rsi:1.4, bollinger:1.3, ema:0.6, stochastic:1.3, adx:0.5 };
  }

  if(atrRegime === 'ALTO'){
    base.ema *= 1.1;
    base.rsi *= 0.9;
  }
  if(atrRegime === 'BAIXO'){
    base.ema *= 0.7;
    base.rsi *= 0.7;
    base.bollinger *= 0.8;
  }

  return base;
}

// =============================
// 📊 MTF
// =============================
function getHTFDirection(htf){
  if(!htf) return 0;
  if(htf.emaFast > htf.emaSlow) return 1;
  if(htf.emaFast < htf.emaSlow) return -1;
  return 0;
}

// =============================
// 🔗 CHAIN CONFIRMATION
// =============================
function chainConfirmation(signals){
  let c = 0;
  if(signals.bollBreak) c++;
  if(signals.emaAligned) c++;
  if(signals.stochTurn) c++;
  if(signals.adxStrong) c++;
  return c;
}

// =============================
// 🧨 FAKE BREAKOUT
// =============================
function detectFakeBreakout(data){
  const { price, prevHigh, prevLow, atr, volume, avgVolume } = data;

  let fake = false;

  if(price > prevHigh && (price - prevHigh) < atr * 0.2) fake = true;
  if(price < prevLow && (prevLow - price) < atr * 0.2) fake = true;

  if(volume && avgVolume && volume < avgVolume * 0.7) fake = true;

  return fake;
}

// =============================
// 📊 ADAPTIVE LEARNING
// =============================
function updatePerformance(setup, result){
  let stats = JSON.parse(localStorage.getItem('stats') || '{}');

  if(!stats[setup]) stats[setup] = { win:0, loss:0 };

  if(result === 'win') stats[setup].win++;
  else stats[setup].loss++;

  localStorage.setItem('stats', JSON.stringify(stats));
}

function getAdaptiveWeight(setup){
  let stats = JSON.parse(localStorage.getItem('stats') || '{}');
  if(!stats[setup]) return 1;

  const { win, loss } = stats[setup];
  const total = win + loss;

  if(total < 10) return 1;

  const winRate = win / total;
  return 0.8 + winRate;
}

// =============================
// 🚫 NO TRADE FILTER
// =============================
function noTradeFilter(ctx){
  const { confidence, atrRegime, confirmations, htfAlign } = ctx;

  if(atrRegime === 'BAIXO') return true;

  if(SNIPER_MODE){
    if(confidence < 0.7) return true;
    if(confirmations < 3) return true;
    if(!htfAlign) return true;
  } else {
    if(confidence < 0.55) return true;
    if(confirmations < 2) return true;
    if(!htfAlign && confidence < 0.7) return true;
  }

  return false;
}

// =============================
// 🚀 FINAL ENGINE
// =============================
function enhancedScore(context){
  let {
    score, signals, regime, atrRegime,
    signalDirection, htfData, confidence,
    marketData, setup
  } = context;

  const weights = getRegimeWeights(regime, atrRegime);

  score += signals.rsi * weights.rsi;
  score += signals.bollinger * weights.bollinger;
  score += signals.ema * weights.ema;
  score += signals.stochastic * weights.stochastic;
  score += signals.adx * weights.adx;

  const htfDir = getHTFDirection(htfData);
  const htfAlign = (htfDir === 0 || signalDirection === htfDir);

  if(!htfAlign) confidence *= SNIPER_MODE ? 0.4 : 0.65;

  const confirmations = chainConfirmation(signals);
  if(confirmations < 3) confidence *= SNIPER_MODE ? 0.4 : 0.6;

  if(detectFakeBreakout(marketData)){
    if(SNIPER_MODE) return { action: "NO TRADE" };
    confidence *= 0.5;
  }

  score *= getAdaptiveWeight(setup || 'default');

  if(atrRegime === 'ALTO') confidence *= 0.75;
  if(atrRegime === 'BAIXO') confidence *= 0.5;

  if(noTradeFilter({
    confidence,
    atrRegime,
    confirmations,
    htfAlign
  })){
    return { action: "NO TRADE" };
  }

  return {
    action: "TRADE",
    score,
    confidence,
    confirmations,
    sniper: SNIPER_MODE
  };
}



// =============================
// 📊 TRADE REGISTRATION SYSTEM
// =============================
function saveTrade(trade){
  let trades = JSON.parse(localStorage.getItem('trades') || '[]');
  trades.push({ ...trade, timestamp: Date.now() });
  localStorage.setItem('trades', JSON.stringify(trades));
}

// =============================
// 📈 PERFORMANCE CALCULATION
// =============================
function getPerformance(){
  let trades = JSON.parse(localStorage.getItem('trades') || '[]');

  let wins = trades.filter(t => t.result === 'win').length;
  let losses = trades.filter(t => t.result === 'loss').length;

  let total = wins + losses;
  let winRate = total ? (wins / total * 100).toFixed(1) : 0;

  return {
    total,
    wins,
    losses,
    winRate
  };
}

// =============================
// 🎨 PERFORMANCE PANEL UI
// =============================
function renderPerformancePanel(){
  let perf = getPerformance();

  let panel = document.getElementById('performance-panel');
  if(!panel) return;

  panel.innerHTML = `
    <div style="background:#0f172a;padding:15px;border-radius:12px;color:white;font-family:sans-serif;">
      <h3 style="margin-bottom:10px;">📊 Performance</h3>
      <p>Total Trades: <b>${perf.total}</b></p>
      <p>Wins: <b style="color:#22c55e">${perf.wins}</b></p>
      <p>Losses: <b style="color:#ef4444">${perf.losses}</b></p>
      <p>Win Rate: <b style="color:#38bdf8">${perf.winRate}%</b></p>
    </div>
  `;
}

// =============================
// 🔄 AUTO UPDATE PANEL
// =============================
setInterval(renderPerformancePanel, 2000);

// 📌 EXAMPLE HOOK (USE IN YOUR TRADE EXECUTION)

</script>
