<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LONDONX — ELITE V3 (13 FATORES)</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root {
            --bg: #010508; --bg2: #050c16; --card: #07101e; --card2: #0a1525;
            --gold: #ffcc00; --cyan: #00f2ff; --green: #00ff88; --red: #ff3366;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* HEADER E GRÁFICO */
        header { padding: 15px; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; background: #000; }
        #chart { flex-grow: 1; width: 100%; background: #000; }

        /* PAINEL DE 13 FATORES */
        .indicators-grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); 
            gap: 5px; padding: 10px; background: var(--card); border-top: 1px solid var(--border);
        }
        .ind-item { background: rgba(255,255,255,0.03); padding: 5px; border-radius: 4px; display: flex; align-items: center; font-size: 10px; }
        .led { width: 8px; height: 8px; border-radius: 50%; background: #222; margin-right: 8px; transition: 0.3s; }
        .led.active { background: var(--cyan); box-shadow: 0 0 10px var(--cyan); }

        /* CONTROLES */
        .controls { padding: 20px; background: #000; display: flex; flex-direction: column; gap: 10px; }
        .btn-trade { padding: 15px; border-radius: 8px; border: none; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; flex: 1; }
        .btn-call { background: var(--green); color: #000; }
        .btn-put { background: var(--red); color: #fff; }

        /* CORREÇÃO PARA COMPUTADOR: OVERLAY DE CONFIRMAÇÃO */
        #confirmationOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 5, 8, 0.9);
            backdrop-filter: blur(10px);
            z-index: 999999; /* Garante que fique acima de tudo no PC */
            justify-content: center;
            align-items: center;
        }

        .modal {
            background: var(--card2);
            border: 2px solid var(--gold);
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .btn-confirm { background: var(--gold); color: #000; padding: 15px; border-radius: 10px; width: 100%; font-family: 'Orbitron'; font-weight: 900; margin-top: 20px; border: none; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div style="font-family:'Orbitron'; color:var(--gold);">LONDONX ELITE V3</div>
    <div id="ml-status" style="font-size:12px; color:var(--cyan);">ML: AGUARDANDO DADOS</div>
</header>

<div id="chart"></div>

<div class="indicators-grid" id="indicators">
    </div>

<div class="controls">
    <input type="password" id="token" placeholder="TOKEN DERIV" style="padding:10px; background:var(--card2); border:1px solid var(--gold); color:#fff; text-align:center; border-radius:5px;">
    <div style="display:flex; gap:10px;">
        <button class="btn-trade btn-call" onclick="openConfirm('CALL')">CALL</button>
        <button class="btn-trade btn-put" onclick="openConfirm('PUT')">PUT</button>
    </div>
</div>

<div id="confirmationOverlay">
    <div class="modal">
        <h2 style="font-family:'Orbitron'; color:var(--gold); margin-bottom:10px;">CONFIRMAR</h2>
        <div id="trade-info" style="font-size:24px; font-weight:900;">---</div>
        <div id="ml-prob" style="margin-top:10px; color:var(--cyan);">Confluência: 10/13</div>
        <button class="btn-confirm" onclick="executeTrade()">EXECUTAR AGORA</button>
        <button onclick="closeConfirm()" style="background:transparent; color:#666; border:none; margin-top:15px; cursor:pointer;">CANCELAR</button>
    </div>
</div>

<script>
    const indicatorsList = [
        "DIDI AGULHADA", "TAPE READING", "FLUXO ORDENS", "QUANT DATA", 
        "SQUEEZE BB", "ADX > 20", "ESTOCÁSTICO", "PRICE ACTION", 
        "SMC / ICT", "VSA VOLUME", "ZONES S/R", "FIBO 61.8", "EMA ALIGN"
    ];

    let chart, series, selectedType;

    // Inicializa Grid
    const grid = document.getElementById('indicators');
    indicatorsList.forEach((ind, i) => {
        grid.innerHTML += `<div class="ind-item"><div id="led-${i}" class="led"></div> ${ind}</div>`;
    });

    function initChart() {
        const chartDiv = document.getElementById('chart');
        chart = LightweightCharts.createChart(chartDiv, {
            layout: { backgroundColor: '#000', textColor: '#d1d4dc' },
            grid: { vertLines: { color: '#111' }, horzLines: { color: '#111' } }
        });
        series = chart.addCandlestickSeries({ upColor: '#00ff88', downColor: '#ff3366' });
        
        window.addEventListener('resize', () => {
            chart.applyOptions({ width: chartDiv.clientWidth, height: chartDiv.clientHeight });
        });
        chart.applyOptions({ width: chartDiv.clientWidth, height: chartDiv.clientHeight });
    }

    function openConfirm(type) {
        selectedType = type;
        document.getElementById('trade-info').innerText = type;
        document.getElementById('trade-info').style.color = type === 'CALL' ? '#00ff88' : '#ff3366';
        document.getElementById('confirmationOverlay').style.display = 'flex';
    }

    function closeConfirm() {
        document.getElementById('confirmationOverlay').style.display = 'none';
    }

    function executeTrade() {
        alert("ORDEM " + selectedType + " ENVIADA COM SUCESSO!");
        closeConfirm();
    }

    window.onload = initChart;

    // Simulação da Lógica de 13 Fatores / ML
    setInterval(() => {
        let activeCount = 0;
        indicatorsList.forEach((_, i) => {
            const active = Math.random() > 0.4; // Simula ML decidindo 9/13 ou 10/13
            document.getElementById(`led-${i}`).className = active ? 'led active' : 'led';
            if(active) activeCount++;
        });
        document.getElementById('ml-status').innerText = `ML: CONFLUÊNCIA ${activeCount}/13`;
    }, 2000);
</script>

</body>
</html>
