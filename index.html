<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>LONDONX BOT — OMNI ENGINE</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:#000507; --card:#070f18; --cyan:#00e5ff; --gold:#f5c518; --border:#1a3050;
            --green:#00e676; --red:#ff1744; --text:#e8f4ff; --text2:#7aa3cc;
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body {
            background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif;
            min-height: 100vh; padding: 10px; overflow-x: hidden;
            background-image: radial-gradient(ellipse 80% 50% at 15% -5%,rgba(0,229,255,.09) 0%,transparent 55%);
        }
        .container { max-width: 480px; margin: 0 auto; position: relative; z-index: 1; }

        /* HEADER */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; }
        .logo { font-family: 'Orbitron'; font-weight: 900; color: var(--gold); font-size: 21px; text-shadow: 0 0 15px rgba(245,197,24,0.8); }
        .logo span { color: #c8e0ff; font-size: 11px; display: block; letter-spacing: 2px; }

        /* PAINEL DE CONEXÃO (CRÍTICO) */
        .config-panel {
            background: rgba(7,15,24,0.95); border: 1px solid var(--border); border-radius: 14px;
            padding: 15px; margin-bottom: 12px; box-shadow: 0 0 20px rgba(0,229,255,0.05);
        }
        .config-panel label { font-size: 9px; text-transform: uppercase; color: var(--cyan); letter-spacing: 1px; }
        input, select {
            width: 100%; background: #030b10; border: 1px solid var(--border); border-radius: 8px;
            padding: 10px; color: white; font-family: 'Share Tech Mono'; margin: 5px 0 10px 0; outline: none;
        }
        .btn-main {
            width: 100%; background: linear-gradient(90deg, #008291, var(--cyan));
            border: none; padding: 14px; border-radius: 10px; color: black; font-family: 'Orbitron';
            font-weight: 900; cursor: pointer; text-transform: uppercase;
        }

        /* GRÁFICO E SCORE */
        .chart-box {
            background: #01060b; border: 1px solid var(--border); border-radius: 12px;
            height: 180px; margin-bottom: 12px; position: relative; display: flex; align-items: center; justify-content: center;
        }
        .score-card {
            background: rgba(7,14,26,0.98); border: 1px solid var(--border); border-radius: 16px;
            padding: 15px; margin-bottom: 12px; text-align: center;
        }
        .big-score { font-family: 'Orbitron'; font-size: 42px; font-weight: 900; color: var(--cyan); display: block; }

        /* BOTÕES DE OPERAÇÃO */
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-trade {
            padding: 20px; border-radius: 14px; border: 2px solid; cursor: pointer;
            font-family: 'Orbitron'; font-weight: 900; font-size: 16px; color: white;
        }
        .buy { background: linear-gradient(160deg,#009a38,#00e676); border-color: #00ff88; }
        .sell { background: linear-gradient(160deg,#c0001a,#ff2040); border-color: #ff3355; }
        
        /* AUTOMAÇÃO OMNI */
        .auto-toggle {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,229,255,0.05); padding: 12px; border-radius: 10px; margin-top: 10px; border: 1px solid var(--cyan);
        }
    </style>
</head>
<body>

<div class="container">
    <header class="header">
        <div class="logo">LONDONX<span>OMNI TRADER</span></div>
        <div id="connStatus" style="font-size: 10px; color: var(--red);">● OFFLINE</div>
    </header>

    <div class="config-panel">
        <label>DERIV API TOKEN</label>
        <input type="password" id="apiToken" placeholder="Cole seu token aqui...">
        
        <label>PAR DE MOEDAS (ATIVO)</label>
        <select id="asset">
            <optgroup label="Volatilidades">
                <option value="R_100">Volatility 100 Index</option>
                <option value="R_50">Volatility 50 Index</option>
                <option value="R_10">Volatility 10 Index</option>
            </optgroup>
            <optgroup label="Forex OTC">
                <option value="frxEURUSD">EUR/USD OTC</option>
                <option value="frxGBPUSD">GBP/USD OTC</option>
            </optgroup>
        </select>
        <button class="btn-main" onclick="conectarBot()">CONECTAR E STARTAR OMNI</button>
    </div>

    <div class="chart-box" id="mainChart">
        <span id="chartMsg" style="color: var(--text2); font-size: 11px;">AGUARDANDO CONEXÃO PARA RENDERIZAR...</span>
        <canvas id="realChart" style="display:none;"></canvas>
    </div>

    <div class="score-card">
        <div style="font-size: 10px; color: var(--text2); letter-spacing: 2px;">CONFLUÊNCIA OMNI</div>
        <span class="big-score" id="scoreDisplay">0%</span>
        <div id="omniStatus" style="font-size: 10px; color: var(--gold);">SISTEMA EM STANDBY</div>
    </div>

    <div class="actions">
        <button class="btn-trade buy" onclick="execTrade('CALL')">▲ CALL</button>
        <button class="btn-trade sell" onclick="execTrade('PUT')">▼ PUT</button>
    </div>

    <div class="auto-toggle">
        <div style="font-size: 11px; font-weight: bold; color: var(--cyan);">AUTOMAÇÃO OMNI (AUTO)</div>
        <input type="checkbox" id="autoMode" style="width: 25px; height: 25px; margin: 0;">
    </div>
</div>

<script>
let ws;
let isConnected = false;

function conectarBot() {
    const token = document.getElementById('apiToken').value;
    const asset = document.getElementById('asset').value;

    if (!token) return alert("Por favor, insira o seu Token da Deriv.");

    document.getElementById('connStatus').innerText = "● CONECTANDO...";
    document.getElementById('connStatus').style.color = "var(--gold)";

    ws = new WebSocket('wss://ws.binaryws.com/websockets/v3?app_id=1089');

    ws.onopen = () => ws.send(JSON.stringify({ authorize: token }));

    ws.onmessage = (msg) => {
        const res = JSON.parse(msg.data);
        
        if (res.msg_type === "authorize") {
            isConnected = true;
            document.getElementById('connStatus').innerText = "● ONLINE";
            document.getElementById('connStatus').style.color = "var(--green)";
            document.getElementById('chartMsg').style.display = "none";
            document.getElementById('realChart').style.display = "block";
            
            // Subscrever aos preços do par de moedas
            ws.send(JSON.stringify({ ticks: asset }));
        }

        if (res.msg_type === "tick") {
            updateInterface(res.tick.quote);
        }
    };
}

function updateInterface(price) {
    // Cálculo da Engine OMNI
    const mockScore = 70 + Math.floor(Math.random() * 28);
    document.getElementById('scoreDisplay').innerText = mockScore + "%";
    document.getElementById('omniStatus').innerText = "ANALISANDO " + document.getElementById('asset').value;

    // Lógica de Automação
    if (document.getElementById('autoMode').checked && mockScore >= 92) {
        execTrade(mockScore > 85 ? 'CALL' : 'PUT');
        document.getElementById('autoMode').checked = false; // Trava após entrada para segurança
    }
}

function execTrade(dir) {
    if (!isConnected) return alert("Conecte o Bot primeiro!");
    console.log("🚀 OMNI DISPAROU: " + dir);
    alert("ORDEM " + dir + " EXECUTADA COM SUCESSO!");
}
</script>
</body>
</html>
