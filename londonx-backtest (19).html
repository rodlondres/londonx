<script>
setInterval(()=>{document.getElementById('clockEl').textContent=new Date().toLocaleTimeString('pt-BR',{hour12:false});},1000);

let nT;
function notify(msg){const el=document.getElementById('notif');el.textContent=msg;el.classList.add('show');clearTimeout(nT);nT=setTimeout(()=>el.classList.remove('show'),2500);}

// ============================================================
// TOKEN — salvo localmente, sem WebSocket persistente
// ============================================================
let savedToken=null;

function doConnect(){
  const t=document.getElementById('tokenInp').value.trim();
  if(!t){notify('⚠ Cole o token!');return;}
  savedToken=t;
  document.getElementById('tokenInp').value='';
  document.getElementById('tokenInp').placeholder='Token salvo ✅';
  document.getElementById('connStatus').textContent='🔄 Verificando...';
  document.getElementById('connStatus').style.color='var(--yellow)';

  // Abre conexão só para verificar
  const w=new WebSocket('wss://ws.binaryws.com/websockets/v3?app_id=1089');
  const timer=setTimeout(()=>{w.close();setConn(false,'Timeout');},8000);
  w.onopen=()=>w.send(JSON.stringify({authorize:t}));
  w.onmessage=(e)=>{
    clearTimeout(timer);
    const d=JSON.parse(e.data);
    if(d.msg_type==='authorize'&&d.authorize&&!d.error){
      const info=(d.authorize.is_virtual?'DEMO':'REAL')+' — '+d.authorize.currency+' $'+parseFloat(d.authorize.balance||0).toFixed(2);
      setConn(true,info);
    } else setConn(false,'Token inválido');
    w.close();
  };
  w.onerror=()=>{clearTimeout(timer);setConn(false,'Erro de conexão');};
}

function setConn(ok,info){
  document.getElementById('connStatus').textContent=(ok?'🟢 ':'🔴 ')+info;
  document.getElementById('connStatus').style.color=ok?'var(--green)':'var(--red)';
  if(ok) notify('✅ Conectado!'); else {notify('❌ '+info);savedToken=null;}
}

// ============================================================
// BUSCA CANDLES — nova conexão a cada vez
// ============================================================
function fetchCandles(sym,gran,count,onDone){
  setProg(20,'Abrindo conexão com Deriv...');
  const w=new WebSocket('wss://ws.binaryws.com/websockets/v3?app_id=1089');
  let authorized=false;

  const timer=setTimeout(()=>{
    try{w.close();}catch(e){}
    onDone(null,'Timeout — tente novamente');
  },20000);

  // Registra onmessage ANTES de abrir conexão
  w.onmessage=(e)=>{
    try{
      const d=JSON.parse(e.data);
      if(d.msg_type==='authorize'){
        if(d.error){clearTimeout(timer);try{w.close();}catch(e){}onDone(null,'Token inválido');return;}
        authorized=true;
        setProg(55,'Buscando '+count+' candles...');
        // Pequeno delay antes de pedir candles
        setTimeout(()=>{
          w.send(JSON.stringify({ticks_history:sym,adjust_start_time:1,count:count,end:'latest',granularity:gran,style:'candles'}));
        },300);
      }
      if(d.msg_type==='candles'){
        clearTimeout(timer);
        setProg(80,'Processando...');
        try{w.close();}catch(e){}
        onDone(d.candles,null);
      }
      if(d.msg_type==='error'){
        clearTimeout(timer);
        try{w.close();}catch(e){}
        onDone(null,d.error.message||'Erro da Deriv');
      }
    }catch(err){clearTimeout(timer);onDone(null,'Erro interno');}
  };

  w.onopen=()=>{
    setProg(35,'Autorizando...');
    w.send(JSON.stringify({authorize:savedToken}));
  };

  w.onerror=()=>{clearTimeout(timer);onDone(null,'Erro WebSocket');};
  w.onclose=()=>{if(!authorized){clearTimeout(timer);onDone(null,'Conexão fechada inesperadamente');}};
}

function setProg(pct,txt){
  document.getElementById('progBar').style.width=pct+'%';
  document.getElementById('progTxt').textContent=txt;
}

// ============================================================
// INDICADORES
// ============================================================
function ema(d,p){const k=2/(p+1);let v=d[0];return d.map((x,i)=>{if(i===0)return v;v=x*k+v*(1-k);return v;});}

function rsi(d,p=14){
  if(d.length<p+2)return d.map(()=>50);
  let g=0,l=0;
  for(let i=1;i<=p;i++){const x=d[i]-d[i-1];x>0?g+=x:l-=x;}
  let ag=g/p,al=l/p;
  const r=new Array(p).fill(50);
  for(let i=p+1;i<d.length;i++){
    const x=d[i]-d[i-1];
    ag=(ag*(p-1)+(x>0?x:0))/p;
    al=(al*(p-1)+(x<0?-x:0))/p;
    r.push(al===0?100:100-(100/(1+(ag/al))));
  }
  return r;
}

function stoch(cs,p=14){
  return cs.map((c,i)=>{
    if(i<p)return 50;
    const sl=cs.slice(i-p+1,i+1);
    const hi=Math.max(...sl.map(x=>x.h)),lo=Math.min(...sl.map(x=>x.l));
    return hi===lo?50:((c.c-lo)/(hi-lo))*100;
  });
}

function bollingerBands(d,p=20,mult=2){
  return d.map((v,i)=>{
    if(i<p)return{mid:v,upper:v,lower:v};
    const sl=d.slice(i-p+1,i+1);
    const mean=sl.reduce((a,b)=>a+b,0)/p;
    const std=Math.sqrt(sl.reduce((a,b)=>a+(b-mean)**2,0)/p);
    return{mid:mean,upper:mean+mult*std,lower:mean-mult*std};
  });
}

// ============================================================
// SINAL — ESTRATÉGIA v7 — OTIMIZADA VOLATILITY 75
// Focada no comportamento específico do V75:
// - Alta volatilidade constante
// - Reversões frequentes
// - Tendências curtas mas fortes
// ============================================================
function getSignal(cs,i){
  if(i<20)return'NONE';

  const sl=cs.slice(Math.max(0,i-25),i+1);
  const cl=sl.map(c=>c.c);
  const n=cl.length-1;
  if(n<18)return'NONE';

  const c0=cs[i],c1=cs[i-1],c2=cs[i-2],c3=cs[i-3]||c2;

  // --- INDICADORES ---
  const r=rsi(cl,7);   // RSI mais rápido para V75
  const st=stoch(sl,7); // Stoch mais rápido
  const bb=bollingerBands(cl,15,2.2); // BB ajustado para alta volatilidade
  const e5=ema(cl,5),e10=ema(cl,10);

  const rV=r[r.length-1]||50, rP=r[r.length-2]||50, rP2=r[r.length-3]||50;
  const stV=st[st.length-1]||50, stP=st[st.length-2]||50;
  const bbV=bb[bb.length-1], bbP=bb[bb.length-2]||bbV;
  const e5V=e5[n], e10V=e10[n], e5P=e5[n-1], e10P=e10[n-1];

  // ATR do V75 — volatilidade alta
  const atr=sl.slice(-7).reduce((a,c)=>a+(c.h-c.l),0)/7||1;

  // === 1. REVERSÃO EXTREMA RSI (peso máximo no V75) ===
  const rsiExtBuy=rV<25&&rV>rP;          // saindo de sobrevenda forte
  const rsiExtSell=rV>75&&rV<rP;         // saindo de sobrecompra forte
  const rsiBuy=rV<35&&rV>rP;             // sobrevenda moderada
  const rsiSell=rV>65&&rV<rP;            // sobrecompra moderada
  const rsiDblBuy=rP2<30&&rP<30&&rV>rP;  // duplo fundo RSI
  const rsiDblSell=rP2>70&&rP>70&&rV<rP; // duplo topo RSI

  // === 2. BOLLINGER BANDS (V75 respeita muito as bandas) ===
  const bbExtBuy=c0.l<bbV.lower&&c0.c>bbV.lower; // fechou dentro da banda
  const bbExtSell=c0.h>bbV.upper&&c0.c<bbV.upper;
  const bbBuy=c1.l<=bbP.lower&&c0.c>c1.c;
  const bbSell=c1.h>=bbP.upper&&c0.c<c1.c;
  const bbMidBuy=c1.c<bbV.mid&&c0.c>bbV.mid;     // cruzou a média
  const bbMidSell=c1.c>bbV.mid&&c0.c<bbV.mid;

  // === 3. STOCHASTIC EXTREMO ===
  const stExtBuy=stP<15&&stV>stP;
  const stExtSell=stP>85&&stV<stP;
  const stBuy=stP<25&&stV>stP;
  const stSell=stP>75&&stV<stP;

  // === 4. PRICE ACTION V75 ===
  const bd=Math.abs(c0.c-c0.o);
  const lSh=Math.min(c0.o,c0.c)-c0.l;
  const uSh=c0.h-Math.max(c0.o,c0.c);

  // Engolfo forte
  const engolfoBuy=c0.c>c0.o&&c1.c<c1.o&&c0.c>c1.o&&c0.o<c1.c;
  const engolfoSell=c0.c<c0.o&&c1.c>c1.o&&c0.c<c1.o&&c0.o>c1.c;

  // Candle de reversão com sombra longa
  const reversalBuy=lSh>bd*1.5&&c0.c>c0.o;
  const reversalSell=uSh>bd*1.5&&c0.c<c0.o;

  // 3 candles esgotados (reversão clássica V75)
  const exhaustBuy=c2.c<c2.o&&c1.c<c1.o&&c0.c>c0.o&&rV<45;
  const exhaustSell=c2.c>c2.o&&c1.c>c1.o&&c0.c<c0.o&&rV>55;

  // === 5. EMA CROSS ===
  const emaCrossUp=e5V>e10V&&e5P<=e10P;
  const emaCrossDn=e5V<e10V&&e5P>=e10P;
  const emaTrendUp=e5V>e10V;
  const emaTrendDn=e5V<e10V;

  // === SCORE FINAL ===
  let B=0,S=0;

  // RSI (peso máximo)
  if(rsiExtBuy)B+=5; else if(rsiBuy)B+=3;
  if(rsiExtSell)S+=5; else if(rsiSell)S+=3;
  if(rsiDblBuy)B+=4; if(rsiDblSell)S+=4;

  // Bollinger
  if(bbExtBuy)B+=4; else if(bbBuy)B+=2;
  if(bbExtSell)S+=4; else if(bbSell)S+=2;
  if(bbMidBuy)B+=2; if(bbMidSell)S+=2;

  // Stoch
  if(stExtBuy)B+=3; else if(stBuy)B+=2;
  if(stExtSell)S+=3; else if(stSell)S+=2;

  // Price Action
  if(engolfoBuy)B+=3; if(engolfoSell)S+=3;
  if(reversalBuy)B+=2; if(reversalSell)S+=2;
  if(exhaustBuy)B+=3; if(exhaustSell)S+=3;

  // EMA
  if(emaCrossUp)B+=2; if(emaCrossDn)S+=2;
  if(emaTrendUp)B+=1; if(emaTrendDn)S+=1;

  // Threshold para V75: 8 pontos e vantagem de 3
  if(B>=8&&B>S+3)return'BUY';
  if(S>=8&&S>B+3)return'SELL';
  return'NONE';
}

// ============================================================
// BACKTEST
// ============================================================
function runBacktest(){
  if(!savedToken){notify('⚠ Conecte primeiro!');return;}
  const sym=document.getElementById('selPair').value;
  const gran=parseInt(document.getElementById('selTF').value);
  const count=parseInt(document.getElementById('selCount').value);
  const stake=parseFloat(document.getElementById('selStake').value)||20;

  document.getElementById('btnRun').disabled=true;
  document.getElementById('btnRun').textContent='⏳ RODANDO...';
  document.getElementById('results').style.display='none';
  setProg(5,'Iniciando...');

  fetchCandles(sym,gran,count,(raw,err)=>{
    if(err||!raw){
      notify('❌ '+(err||'Sem dados'));
      resetBtn();return;
    }
    setProg(85,'Simulando estratégia...');
    setTimeout(()=>{
      const cs=raw.map(c=>({o:parseFloat(c.open),h:parseFloat(c.high),l:parseFloat(c.low),c:parseFloat(c.close)}));
      simulate(cs,stake);
    },30);
  });
}

function simulate(cs,stake){
  let cap=1000,maxCap=1000,maxDD=0,W=0,L=0;
  const trades=[],eq=[1000];
  for(let i=35;i<cs.length-1;i++){
    const sig=getSignal(cs,i);
    if(sig==='NONE')continue;
    const entry=cs[i].c,exit=cs[i+1].c;
    const isBuy=sig==='BUY';
    const won=isBuy?(exit>entry):(exit<entry);
    const pl=won?+(stake*0.85):-(stake);
    cap+=pl;eq.push(cap);
    if(cap>maxCap)maxCap=cap;
    const dd=((maxCap-cap)/maxCap)*100;
    if(dd>maxDD)maxDD=dd;
    won?W++:L++;
    trades.push({n:trades.length+1,sig,entry,exit,won,pl:pl.toFixed(2),cap:cap.toFixed(2)});
  }
  setProg(100,'Concluído!');
  showResults(trades,W,L,cap,maxDD,eq);
  resetBtn();
}

function showResults(trades,W,L,cap,maxDD,eq){
  const tot=W+L;
  const wr=tot>0?((W/tot)*100).toFixed(1):0;
  const pl=(cap-1000).toFixed(2);
  document.getElementById('sWR').textContent=wr+'%';
  document.getElementById('sWR').style.color=wr>=58?'var(--green)':wr>=54?'var(--yellow)':'var(--red)';
  document.getElementById('sPL').textContent=(pl>=0?'+':'')+pl;
  document.getElementById('sPL').style.color=pl>=0?'var(--green)':'var(--red)';
  document.getElementById('sTot').textContent=tot;
  document.getElementById('sWL').textContent=W+'W / '+L+'L';
  document.getElementById('sDD').textContent=maxDD.toFixed(1)+'%';
  document.getElementById('sDD').style.color=maxDD<10?'var(--green)':maxDD<20?'var(--yellow)':'var(--red)';
  drawCurve(eq);
  document.getElementById('tBody').innerHTML=trades.slice(-50).reverse().map(t=>{
    const dec=t.entry>10?3:5;
    return`<tr><td style="color:var(--text2)">${t.n}</td><td><span class="badge ${t.sig.toLowerCase()}">${t.sig}</span></td><td style="font-family:'Share Tech Mono';font-size:10px">${t.entry.toFixed(dec)}</td><td style="font-family:'Share Tech Mono';font-size:10px">${t.exit.toFixed(dec)}</td><td class="${t.won?'win':'loss'}">${t.won?'✅ WIN':'❌ LOSS'}</td><td class="${t.won?'win':'loss'}" style="font-family:'Orbitron';font-size:11px">${t.won?'+':''}${t.pl}</td><td style="font-family:'Share Tech Mono';font-size:10px;color:var(--text2)">${t.cap}</td></tr>`;
  }).join('');
  document.getElementById('results').style.display='block';
  notify('✅ '+tot+' ops — WR '+wr+'%');
}

function drawCurve(eq){
  const cv=document.getElementById('eqChart');
  const dpr=window.devicePixelRatio||1;
  cv.width=cv.offsetWidth*dpr||400;cv.height=120*dpr;
  const ctx=cv.getContext('2d'),w=cv.width,h=cv.height;
  const mn=Math.min(...eq),mx=Math.max(...eq),rng=mx-mn||1;
  ctx.clearRect(0,0,w,h);
  ctx.strokeStyle='rgba(0,229,255,.08)';ctx.lineWidth=1;
  [0,1,2,3].forEach(i=>{const y=(h/3)*i;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();});
  const by=h-((1000-mn)/rng)*h;
  ctx.setLineDash([4,4]);ctx.strokeStyle='rgba(255,214,0,.3)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,by);ctx.lineTo(w,by);ctx.stroke();ctx.setLineDash([]);
  const profit=eq[eq.length-1]>=1000,col=profit?'#00e676':'#ff1744';
  const gr=ctx.createLinearGradient(0,0,0,h);
  gr.addColorStop(0,profit?'rgba(0,230,118,.2)':'rgba(255,23,68,.2)');gr.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath();eq.forEach((v,i)=>{const x=(i/(eq.length-1))*w,y=h-((v-mn)/rng)*h;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
  ctx.lineTo(w,h);ctx.lineTo(0,h);ctx.closePath();ctx.fillStyle=gr;ctx.fill();
  ctx.beginPath();ctx.strokeStyle=col;ctx.lineWidth=2*dpr;
  eq.forEach((v,i)=>{const x=(i/(eq.length-1))*w,y=h-((v-mn)/rng)*h;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});ctx.stroke();
}

function resetBtn(){
  document.getElementById('btnRun').disabled=false;
  document.getElementById('btnRun').textContent='▶ RODAR BACKTEST';
}
